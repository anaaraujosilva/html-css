<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em Css</title>
    <style>
        *{ 
            height: 100%;
        }
        body {
            background-image: linear-gradient(to left, #7ACF9C 10%, #23CF70, #3D7A59, #355041);
        }
        h1 {
            color: white;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
    </style>
</head>
<body>
    <h1>Testando gradiente</h1>
</body>
</html>
