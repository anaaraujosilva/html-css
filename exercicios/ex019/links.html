<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        a {
            color: black;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            color: blueviolet;
        }
        a:hover {
            color: rgb(71, 156, 85);
            text-decoration: underline;
        }
        a:active {
            color: rgb(151, 203, 233);
        }
        .especial {
            background-color: rgb(23, 77, 26);
        }
        .especial::before {
            content: '⇨';
        }
        .especiala::after {
            content: '⇦';
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara" target="_blank">reposítorio github</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" class="especial">canal do youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/" class="especial">site do curvoemvideo</a></li>
    </ul>
</body>
</html>
