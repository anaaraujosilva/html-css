<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo de hover</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        div > p {
            display: none;
        }
        div:hover >p {
            display: block;
            color: white;
            background-color: rgb(94, 172, 94);
            width: 170px;
        }
        div:hover {
            color: rgb(94, 172, 94);
        }
    </style>
</head>
<body>
    <h1>exercicio de hover</h1>
    <p>passe o mouse sobre o texto abaixo</p>
    <div>
        passe o mouse aqui
        <p>texto escondido hahahaha</p>
    </div>
    <p>fim do exercicio</p>
</body>
</html>
